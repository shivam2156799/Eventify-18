<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Secretary Dashboard Pro | Eventify</title>
  <link rel="stylesheet" href="style.css?v=8.1" />
  <style>
    /* PRO UI STYLES */
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
    body { background:#0f172a; color:white; min-height:100vh; }
    .sync-proofer { background:#10b981; color:white; text-align:center; padding:12px; font-weight:800; font-size:14px; position:sticky; top:0; z-index:10000; }
    
    .navbar { display:flex; justify-content:space-between; align-items:center; padding:20px 50px; background:rgba(15,23,42,0.95); border-bottom:1px solid #1e293b; position:sticky; top:38px; z-index:999; }
    .navbar h1 { color:#a855f7; font-size:24px; font-weight:800; }
    .nav-links a { margin-left:25px; color:#94a3b8; text-decoration:none; font-weight:700; font-size:14px; }
    .nav-links a:hover { color:#a855f7; }

    .dash-main { display:grid; grid-template-columns:300px 1fr; gap:40px; padding:50px; max-width:1450px; margin:0 auto; }
    .sidebar { background:#1e293b; border-radius:24px; padding:40px 25px; box-shadow:0 20px 40px rgba(0,0,0,0.3); height:fit-content; }
    .sidebar h2 { font-size:1.4rem; margin-bottom:5px; color:#f1f5f9; text-align:center; }
    .sidebar .club-info { text-align:center; margin-bottom:40px; border-bottom:1px solid #334155; padding-bottom:20px; }
    .sidebar .club-info h3 { font-size:0.9rem; color:#a855f7; font-weight:900; margin-bottom:5px; }
    .sidebar .club-info p { font-size:0.75rem; color:#64748b; font-weight:800; }

    .tab-list { list-style:none; }
    .tab-item { padding:16px; margin-bottom:12px; border-radius:14px; cursor:pointer; color:#94a3b8; font-weight:700; display:flex; justify-content:space-between; align-items:center; transition:0.3s; }
    .tab-item.active { background:#a855f7; color:white; }
    .tab-item:hover:not(.active) { background:rgba(168,85,247,0.1); color:#a855f7; }
    .tab-item .badge { background:rgba(0,0,0,0.2); padding:4px 10px; border-radius:8px; font-size:0.7rem; font-weight:900; }

    .btn-add-pro { width:100%; padding:16px; background:#10b981; border:none; border-radius:14px; color:white; font-weight:900; font-size:1rem; cursor:pointer; margin-top:40px; box-shadow:0 10px 20px rgba(16,185,129,0.3); transition:0.3s; }
    .btn-add-pro:hover { transform:translateY(-2px); box-shadow:0 15px 30px rgba(16,185,129,0.4); }

    .content-area { background:#1e293b; border-radius:24px; padding:50px; box-shadow:0 20px 40px rgba(0,0,0,0.3); }
    .content-area h2 { font-size:2.2rem; margin-bottom:40px; color:#f8fafc; }

    .event-card { background:#0f172a; border-radius:20px; padding:30px; margin-bottom:25px; border-left:6px solid #a855f7; display:flex; justify-content:space-between; align-items:flex-start; position:relative; }
    .event-tag { position:absolute; top:25px; right:25px; background:#f59e0b; color:black; padding:4px 12px; border-radius:6px; font-size:0.75rem; font-weight:900; text-transform:uppercase; }
    .event-id h3 { font-size:1.6rem; color:#f8fafc; margin-bottom:10px; }
    .event-id p { color:#94a3b8; font-size:0.95rem; margin-bottom:20px; }
    
    .card-footer { display:flex; gap:12px; }
    .foot-btn { padding:10px 20px; border-radius:10px; border:none; font-weight:800; font-size:0.85rem; cursor:pointer; transition:0.3s; text-decoration:none; }
    .btn-view { background:#3b82f6; color:white; }
    .btn-edit { background:#475569; color:white; }
    .btn-del { background:#ef4444; color:white; }

    /* Modal Styling */
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:10000; }
    .modal-box { background:#1e293b; width:95%; max-width:480px; padding:40px; border-radius:28px; border:1px solid #334155; }
    .form-grp { margin-bottom:20px; }
    .form-grp label { display:block; font-size:11px; color:#a855f7; font-weight:900; text-transform:uppercase; margin-bottom:8px; }
    .form-grp input, .form-grp textarea { width:100%; padding:14px; background:#0f172a; border:1px solid #334155; border-radius:10px; color:white; outline:none; }
  </style>
</head>
<body>
  <div class="sync-proofer">🚩 DASHBOARD PRO V8: ALL FEATURES RESTORED 🚩</div>

  <header class="navbar">
    <h1>Eventify</h1>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="clubs-v5.html">Clubs</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="#" onclick="logout()" style="color:#ef4444; font-weight:800; border:1px solid #ef4444; padding:6px 14px; border-radius:8px;">LOGOUT</a></li>
    </ul>
  </header>

  <script>
    const user = JSON.parse(localStorage.getItem('loggedSecretary'));
    if (!user) window.location.href = 'portal-unified.html';
    const cName = user.club;
    localStorage.setItem('lastActiveClub', cName);
    const sName = cName.replace(/[^a-zA-Z0-9]/g, '_');
    const cKey = `clubInfo_${sName}`;
  </script>

  <!-- Rest of HTML remains the same... -->

  <script>
    const HOME_NOTIFICATION_KEY = 'home_ongoing_notifications';
    const NOTIFICATION_TTL_MS = 24 * 60 * 60 * 1000;

    function getActiveHomeNotifications() {
      const now = Date.now();
      const all = JSON.parse(localStorage.getItem(HOME_NOTIFICATION_KEY)) || [];
      const active = all.filter(item => item && item.createdAt && (now - item.createdAt) <= NOTIFICATION_TTL_MS);
      localStorage.setItem(HOME_NOTIFICATION_KEY, JSON.stringify(active));
      return active;
    }

    function addHomeNotificationForEvent(eventObj) {
      if (!eventObj || eventObj.status !== 'ongoing') return;
      const active = getActiveHomeNotifications();
      active.unshift({
        id: eventObj.id,
        club: cName,
        title: eventObj.name,
        desc: eventObj.desc,
        date: eventObj.date,
        createdAt: Date.now()
      });
      localStorage.setItem(HOME_NOTIFICATION_KEY, JSON.stringify(active));
    }

    document.getElementById('panel-club-name').textContent = cName;
    document.getElementById('panel-sec-name').textContent = "Club Dashboard";
    
    // Standardized Storage Key
    const eventKey = `events_${sName}`;
    let events = JSON.parse(localStorage.getItem(eventKey)) || [];

    function switchMode(m) {
      document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
      document.getElementById('tab-'+m).classList.add('active');
      document.getElementById('event-feed').style.display = (m==='sett'||m==='teams') ? 'none' : 'block';
      document.getElementById('sett-panel').style.display = (m==='sett') ? 'block' : 'none';
      document.getElementById('teams-panel').style.display = (m==='teams') ? 'block' : 'none';
      document.getElementById('main-title').textContent = (m==='total'?'Total Events':m==='ongoing'?'Ongoing Events':m==='upcoming'?'Upcoming Events':m==='teams'?'Registered Teams':'Club Settings');
      
      if(m==='sett') {
         const s = JSON.parse(localStorage.getItem(cKey)) || {};
         document.getElementById('s-desc').value = s.description || '';

        if (Object.prototype.hasOwnProperty.call(s, 'secretaryName') || Object.prototype.hasOwnProperty.call(s, 'coSecretary')) {
          delete s.secretaryName;
          delete s.coSecretary;
          localStorage.setItem(cKey, JSON.stringify(s));
        }
      } else { render(m); }
    }

    function render(filter) {
      const f = document.getElementById('event-feed'); f.innerHTML='';
      const list = filter==='total'?events:events.filter(e => e.status === filter);
      document.getElementById('count-total').textContent = events.length;
      document.getElementById('count-ong').textContent = events.filter(e=>e.status==='ongoing').length;
      document.getElementById('count-upc').textContent = events.filter(e=>e.status==='upcoming').length;
      
      list.forEach(e => {
        const d = document.createElement('div'); d.className='event-card';
        d.innerHTML = `<span class='event-tag'>${e.status}</span><div class='event-id'><h3>${e.name}</h3><p>📅 ${e.date}<br>${e.desc}</p><div class='card-footer'><a href='#' class='foot-btn btn-view'>View Students</a><button onclick='del(${e.id})' class='foot-btn btn-del'>Delete</button></div></div>`;
        f.appendChild(d);
      });
    }

    function savePro() {
      const data = { description: document.getElementById('s-desc').value, club: cName };
      localStorage.setItem(cKey, JSON.stringify(data));
      const b = document.getElementById('sync-ok'); b.style.display='block';
      setTimeout(()=>b.style.display='none', 3000);
    }

    function del(id) {
       if(!confirm('Delete this event?')) return;
       events = events.filter(e => e.id !== id);
       localStorage.setItem(eventKey, JSON.stringify(events));
       render(document.querySelector('.tab-item.active').id.split('-')[1]);
    }

    function logout() { localStorage.removeItem('loggedSecretary'); window.location.href = 'portal-unified.html'; }
    function openMod() { document.getElementById('modal').style.display='flex'; }
    function closeMod() { document.getElementById('modal').style.display='none'; }
    
    document.getElementById('new-ev-form').addEventListener('submit', (ev)=>{
       ev.preventDefault();
       const newEvent = { id:Date.now(), name:document.getElementById('ev-t').value, date:document.getElementById('ev-d').value, status:document.getElementById('ev-s').value, desc:document.getElementById('ev-ds').value };
       events.push(newEvent);
       addHomeNotificationForEvent(newEvent);
       localStorage.setItem(eventKey, JSON.stringify(events));
       closeMod(); switchMode('total');
    });

    switchMode('total');
  </script>
</body>
</html>
